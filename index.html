<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1e1e2f, #0f0f1a);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  color: white;
}

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  padding: 35px;
  border-radius: 25px;
  box-shadow: 0 0 40px rgba(255,105,180,0.4);
  text-align: center;
  max-width: 360px;
}

h1 { color: #ff9acb; }

p { font-size: 15px; line-height: 1.6; }

.btn {
  margin: 10px;
  padding: 12px 22px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

.yes { background: linear-gradient(45deg,#ff6ec4,#7873f5); color:white; }
.angry { background:#ff4757; color:white; }

.heart {
  position:absolute;
  font-size:18px;
  animation:float 6s linear infinite;
  opacity:0.5;
}

@keyframes float {
  0% { transform:translateY(100vh);} 
  100% { transform:translateY(-10vh);} 
}

.explosion {
  position:fixed;
  font-size:22px;
  animation:explode 1s forwards;
}

@keyframes explode {
  0% {opacity:1;} 
  100% {transform:translate(var(--x),var(--y));opacity:0;} 
}

.final-screen {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:22px;
  opacity:0;
  pointer-events:none;
  transition:1s;
}

.final-screen.show {
  opacity:1;
  pointer-events:auto;
}

.glow {
  color:#ff9acb;
  animation:glow 1.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow:0 0 10px #ff9acb; }
  to { text-shadow:0 0 25px #ff6ec4; }
}
</style>
</head>

<body>

<div class="card">
<h1 id="title"></h1>
<p id="msg"></p>

<button class="btn yes" onclick="yesClick()">Okay 😊</button>

<button class="btn angry" id="angryBtn"
onmouseover="escape()"
ontouchstart="escape()">
Still Angry 😤
</button>

</div>

<div class="final-screen" id="finalScreen">
  <div class="glow">I really mean it ❤️</div>
  <div style="margin-top:10px">You matter to me a lot</div>
</div>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>

<script>

// typing text
const titleText="Hey Sudiksha ❤️";

const msgText="Yesterday didn’t feel right...\n\nI slept without letting you know, and I’m really sorry for that.\n\nIt wasn’t right to just disappear like that.\n\nTalking to you has quietly become my favorite part of the day.\n\nCan I make it right today? ✨";

let i=0;
function typeTitle(){
 if(i<titleText.length){
  document.getElementById("title").innerHTML+=titleText[i];
  i++; setTimeout(typeTitle,60);
 } else typeMsg();
}

let j=0;
function typeMsg(){
 if(j<msgText.length){
  let c=msgText[j]==="\n"?"<br>":msgText[j];
  document.getElementById("msg").innerHTML+=c;
  j++; setTimeout(typeMsg,30);
 }
}

// floating hearts
for(let i=0;i<20;i++){
 let h=document.createElement("div");
 h.className="heart";
 h.innerHTML="❤️";
 h.style.left=Math.random()*100+"vw";
 document.body.appendChild(h);
}

// yes click
function yesClick(){
 document.getElementById("msg").innerHTML="";
 let text="That smile means everything to me ❤️\n\nI really didn’t like how yesterday ended…\n\nI’ll make sure it doesn’t happen again 😌\n\nI love you, suwo ❤️";

 let k=0;
 function typeFinal(){
  if(k<text.length){
   let c=text[k]==="\n"?"<br>":text[k];
   document.getElementById("msg").innerHTML+=c;
   k++; setTimeout(typeFinal,40);
  }
 }

 typeFinal();
 explosion();
 document.getElementById("music").play();

 setTimeout(()=>{
  document.getElementById("finalScreen").classList.add("show");
 },2500);
}

// impossible angry button 😈
function escape(){
  const btn = document.getElementById("angryBtn");

  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);

  btn.style.position = "fixed";
  btn.style.left = x + "px";
  btn.style.top = y + "px";

  btn.style.transform = "rotate(" + (Math.random()*40 - 20) + "deg)";
}

// heart explosion
function explosion(){
 for(let i=0;i<30;i++){
  let h=document.createElement("div");
  h.className="explosion";
  h.innerHTML="❤️";
  let a=Math.random()*2*Math.PI;
  let d=Math.random()*200;
  h.style.setProperty('--x',Math.cos(a)*d+'px');
  h.style.setProperty('--y',Math.sin(a)*d+'px');
  h.style.left="50%";
  h.style.top="50%";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),1000);
 }
}

typeTitle();

</script>

</body>
</html>
