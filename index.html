<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #1e1e2f, #0f0f1a);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      padding: 35px;
      border-radius: 25px;
      box-shadow: 0 0 40px rgba(255, 105, 180, 0.4);
      text-align: center;
      max-width: 360px;
      animation: fadeIn 1.2s ease;
    }

    h1 {
      margin-bottom: 10px;
      font-weight: 700;
      color: #ff9acb;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: #f1f1f1;
    }

    .btn {
      margin: 10px;
      padding: 12px 22px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .yes {
      background: linear-gradient(45deg, #ff6ec4, #7873f5);
      color: white;
      box-shadow: 0 0 15px rgba(255,110,196,0.6);
    }

    .yes:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(255,110,196,1);
    }

    .angry {
      background: #ff4757;
      color: white;
      position: relative;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .heart {
      position: absolute;
      color: rgba(255,255,255,0.15);
      animation: float 8s linear infinite;
      font-size: 18px;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    .explosion-heart {
      position: fixed;
      font-size: 22px;
      pointer-events: none;
      animation: explode 1s ease-out forwards;
    }

    @keyframes explode {
      0% { transform: scale(0.5); opacity: 1; }
      100% { transform: translate(var(--x), var(--y)) scale(2); opacity: 0; }
    }

  </style>
</head>
<body>

<script>
  for (let i = 0; i < 25; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 4 + 4) + "s";
    document.body.appendChild(heart);
  }
</script>

<div class="card">
  <h1>Hey Sudikshaa ❤️</h1>
  <p id="message">
    Yesterday didn’t feel right...<br><br>
    Not because I slept early, but because I didn’t say goodnight to you.<br><br>
    Talking to you has quietly become my favorite part of the day.<br><br>
    Can I make it right today? ✨
  </p>

  <button class="btn yes" onclick="happy()">Okay 😊</button>
  <button class="btn angry" id="angryBtn" onmouseover="moveButton()">Still Angry 😤</button>
</div>

<script>
  function happy() {
    document.getElementById('message').innerHTML = "You just made my day ❤️<br><br>I promise I’ll make it up to you properly 😌<br><br><b style='font-size:18px;'>I love you suwo ❤️</b>";
    heartExplosion();
  }

  function moveButton() {
    let btn = document.getElementById('angryBtn');
    let x = Math.random() * 200 - 100;
    let y = Math.random() * 200 - 100;
    btn.style.transform = `translate(${x}px, ${y}px)`;
  }

  function heartExplosion() {
    for (let i = 0; i < 40; i++) {
      let heart = document.createElement("div");
      heart.className = "explosion-heart";
      heart.innerHTML = "❤️";

      let angle = Math.random() * 2 * Math.PI;
      let distance = Math.random() * 250 + 50;

      let x = Math.cos(angle) * distance + 'px';
      let y = Math.sin(angle) * distance + 'px';

      heart.style.setProperty('--x', x);
      heart.style.setProperty('--y', y);

      heart.style.left = "50%";
      heart.style.top = "50%";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 1000);
    }
  }
</script>

</body>
</html>
